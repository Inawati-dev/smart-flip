<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perpustakaan Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar" id="topbar">
  <div class="header-inner">
    <a class="logo" href="#">
      <span class="logo-mark">📖</span>
      <span class="logo-text" id="siteName">Perpustakaan Digital</span>
    </a>
    <div class="topbar-right">
      <a class="topbar-link" id="dashboardBack" href="dashboard-mhs.html" title="Kembali ke Dashboard">← Dashboard</a>
      <a class="topbar-link" href="changelog.html" title="Changelog">v0.4</a>
    </div>
  </div>
</header>

<div class="app" id="app">

  <!-- ═══ LEFT: FLIP PANE ═══ -->
  <section class="flip-pane" id="flipPane">

    <!-- Welcome screen (shown before any book is opened) -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">📚</div>
      <h2>Pilih buku dari katalog</h2>
      <p>Klik judul buku apa saja untuk mulai membaca</p>
    </div>

    <!-- Loading progress -->
    <div class="fl-loader" id="flLoader">
      <div class="fl-title" id="flTitle"></div>
      <div class="fl-spinner-wrap">
        <div class="fl-ring"></div>
      </div>
      <div class="fl-bar-wrap">
        <div class="fl-bar"><div class="fl-fill" id="flFill"></div></div>
        <span class="fl-detail" id="flDetail">Mempersiapkan…</span>
      </div>
    </div>

    <!-- Book stage -->
    <div class="stage" id="stage">
      <div class="zoom-outer" id="zoomOuter">
        <div class="book-wrap">
          <div class="book" id="book">
            <div class="pg pg-l" id="pgL"></div>
            <div class="spine"></div>
            <div class="pg pg-r" id="pgR"></div>
            <div class="flipper" id="flipper">
              <div class="f-face f-front" id="fFront"></div>
              <div class="f-face f-back" id="fBack"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <button class="tb-btn" id="btnFirst" title="Halaman pertama">⏮</button>
      <button class="tb-btn" id="btnPrev"  title="Sebelumnya">‹</button>
      <span   class="pg-counter" id="pgCounter">— / —</span>
      <button class="tb-btn" id="btnNext"  title="Berikutnya">›</button>
      <button class="tb-btn" id="btnLast"  title="Halaman terakhir">⏭</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btnThumb" title="Thumbnail strip">⊞</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btnZoomOut" title="Perkecil (−)">−</button>
      <span   class="zoom-label" id="zoomLabel">100%</span>
      <button class="tb-btn" id="btnZoomIn"  title="Perbesar (+)">+</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btnExpand" title="Perluas / Ciutkan">⤢</button>
      <div class="bg-chip" id="bgProgress"><span id="bgText">Memuat latar…</span></div>
    </div>

    <!-- Mobile back button -->
    <button class="mobile-back" id="mobileBack">← Katalog</button>

  </section>

  <!-- ═══ RIGHT: CATALOG PANE ═══ -->
  <aside class="cat-pane" id="catPane">
    <div class="cp-head">
      <h2>Katalog Buku</h2>
      <p class="cp-sub" id="catSub">Memuat…</p>
    </div>
    <div class="cp-loading" id="cpLoading">
      <div class="cp-ring"></div>
    </div>
    <div class="cp-error" id="cpError">
      <div class="cp-err-icon">⚠️</div>
      <p>Gagal memuat katalog</p>
      <p class="cp-hint" id="stateHint"></p>
    </div>
    <div class="cp-grid" id="bookGrid"></div>
    <div class="cp-footer">
      <button class="btn-lanjut" id="btnLanjut" disabled>Buka Penuh &nbsp;⤢</button>
    </div>
  </aside>

</div><!-- /.app -->

<!-- Thumbnail strip -->
<div id="thumbRow"><div class="thumblist" id="thumbList"></div></div>

<!-- Zoom hint -->
<div class="zoom-hint" id="zoomHint">Scroll untuk zoom · Drag untuk geser</div>

<!-- Supabase (untuk cek role → arah tombol dashboard) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
(async function() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const { data: p } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
      const back = document.getElementById('dashboardBack');
      if (p && p.role === 'dosen') back.href = 'dashboard-dos.html';
      else back.href = 'dashboard-mhs.html';
    }
  } catch(e) {}
})();
</script>
<!-- pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<script src="script.js"></script>
</body>
</html>
