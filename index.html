<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perpustakaan Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<!-- ══════════════ CATALOG VIEW ══════════════ -->
<div id="catalogView">

  <header class="topbar" id="topbar">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">✦</span>
        <span class="logo-text" id="siteName">Perpustakaan</span>
      </div>
      <nav class="nav-links">
        <a href="#" class="nav-link active">Pustaka</a>
        <a href="#" class="nav-link">Koleksi</a>
        <a href="#" class="nav-link">Tentang</a>
      </nav>
      <div class="header-right">
        <button class="btn-nav-search"><i class="fas fa-search"></i> Cari</button>
        <button class="hamburger" id="hamburger" aria-label="Buka menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="#" class="nav-link">Pustaka</a>
      <a href="#" class="nav-link">Koleksi</a>
      <a href="#" class="nav-link">Tentang</a>
      <a href="#" class="nav-link">Cari</a>
    </div>
  </header>

  <main class="catalog-main">
    <!-- Hero -->
    <section class="hero">
      <div class="hero-text">
        <div class="hero-badge"><span class="badge-dot"></span>Koleksi Terbaru</div>
        <h1 class="hero-title">Katalog <em>Buku</em><br>Pilihan</h1>
        <p class="hero-sub" id="catSub">Memuat koleksi…</p>
      </div>
      <div class="hero-deco" aria-hidden="true">🍂</div>
    </section>

    <!-- Catalog grid -->
    <section class="catalog-section">
      <div class="section-bar">
        <h2 class="section-title">Semua Buku</h2>
      </div>

      <div id="stateLoading" class="state-box">
        <div class="spinner"></div>
        <p class="state-msg">Memuat koleksi buku…</p>
      </div>
      <div id="stateError" class="state-box" style="display:none">
        <p class="state-icon">📭</p>
        <p class="state-msg">Tidak ada buku ditemukan</p>
        <p class="state-hint" id="stateHint"></p>
      </div>
      <div class="book-grid" id="bookGrid" style="display:none"></div>
    </section>
  </main>
</div>

<!-- ══════════════ READER VIEW ══════════════ -->
<div id="readerView">

  <!-- Loading overlay -->
  <div id="openLoader" class="open-loader">
    <div class="ol-icon">📖</div>
    <div class="ol-spinner"></div>
    <p class="ol-title" id="olText">Membuka buku…</p>
    <div class="ol-bar"><div class="ol-fill" id="olFill"></div></div>
    <p class="ol-detail" id="olDetail">Memuat PDF…</p>
  </div>

  <!-- Top bar -->
  <div class="reader-topbar">
    <button class="btn-back" id="btnBack">
      <i class="fas fa-arrow-left"></i><span class="back-label">Katalog</span>
    </button>
    <div class="reader-title" id="topTitle"></div>
    <div class="bg-progress" id="bgProgress">
      <span class="bg-dot"></span>
      <span id="bgText">Memuat…</span>
    </div>
  </div>

  <!-- Stage -->
  <div class="stage" id="stage">
    <div class="zoom-outer" id="zoomOuter">
      <div class="book-wrap">
        <div class="book" id="book">
          <div class="pg pg-l" id="pgL"><div class="pg-blank"></div></div>
          <div class="spine"></div>
          <div class="pg pg-r" id="pgR"><div class="pg-blank"></div></div>
          <div class="flipper" id="flipper">
            <div class="f-face f-front" id="fFront"></div>
            <div class="f-face f-back"  id="fBack"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="tb">
      <button class="btn-tb" id="btnFirst"   title="Halaman pertama"><i class="fas fa-backward-step"></i></button>
      <button class="btn-tb" id="btnPrev"    title="Sebelumnya"><i class="fas fa-chevron-left"></i></button>
      <div class="tb-sep"></div>
      <div class="pg-counter" id="pgCounter"><b>—</b> / —</div>
      <div class="tb-sep"></div>
      <button class="btn-tb" id="btnNext"    title="Berikutnya"><i class="fas fa-chevron-right"></i></button>
      <button class="btn-tb" id="btnLast"    title="Halaman terakhir"><i class="fas fa-forward-step"></i></button>
      <div class="tb-sep"></div>
      <button class="btn-tb" id="btnThumb"   title="Semua halaman"><i class="fas fa-border-all"></i></button>
      <div class="tb-sep"></div>
      <button class="btn-tb" id="btnZoomOut" title="Perkecil (−)"><i class="fas fa-minus"></i></button>
      <div class="zoom-label" id="zoomLabel" title="Klik 2× untuk reset">100%</div>
      <button class="btn-tb" id="btnZoomIn"  title="Perbesar (+)"><i class="fas fa-plus"></i></button>
    </div>
  </div>
</div>

<!-- Thumbnails (fixed overlay) -->
<div id="thumbRow"><div class="thumblist" id="thumbList"></div></div>

<!-- Zoom hint -->
<div class="zoom-hint" id="zoomHint">Scroll untuk zoom &middot; Drag untuk geser &middot; 2× klik untuk reset</div>

<script src="script.js"></script>
</body>
</html>
