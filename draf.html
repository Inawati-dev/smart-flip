<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Asistensi Draf — SMART-FLIP 5.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F2E9;--ivory:#FFFDF8;--ivory2:#FAF7F2;
  --sage:#8FA287;--sage-d:#6B7E64;--sage-bg:#EBF0E7;
  --terra:#C8925A;--terra-d:#A87040;
  --brown:#2C2420;--brown2:#4A3D33;--brown3:#7A6B5E;
  --line:#DDD5C4;--line2:#EDE8DF;
  --red:#B03020;
}
html,body{min-height:100%;background:var(--cream);color:var(--brown);font-family:'DM Sans',sans-serif}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--brown);height:54px;
  display:flex;align-items:center;gap:.75rem;padding:0 1.25rem;
}
.btn-back{
  color:rgba(255,255,255,.6);text-decoration:none;font-size:.82rem;
  display:flex;align-items:center;gap:.35rem;transition:color .15s;
  flex-shrink:0;
}
.btn-back:hover{color:#fff}
.topbar-title{
  font-family:'Playfair Display',serif;font-size:1.05rem;
  color:var(--terra);flex:1;text-align:center;
}
.draft-count{
  font-size:.72rem;font-weight:600;color:rgba(255,255,255,.45);
  white-space:nowrap;
}

/* ── LAYOUT ── */
.wrap{max-width:800px;margin:0 auto;padding:1.5rem 1.25rem 3rem}

/* ── FILTER TABS ── */
.filter-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.tab-btn{
  height:32px;padding:0 .9rem;border-radius:100px;border:1.5px solid var(--line);
  background:transparent;font-family:'DM Sans',sans-serif;font-size:.78rem;
  color:var(--brown3);cursor:pointer;transition:all .18s;white-space:nowrap;
}
.tab-btn:hover{border-color:var(--terra);color:var(--terra)}
.tab-btn.active{background:var(--terra);border-color:var(--terra);color:#fff}
.btn-new-draft{
  margin-left:auto;height:34px;padding:0 1rem;border-radius:100px;border:none;
  background:var(--brown);color:var(--terra);
  font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;
  cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.btn-new-draft:hover{background:var(--terra);color:#fff}

/* ── DRAFT LIST ── */
#draftList{display:flex;flex-direction:column;gap:.75rem}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--brown3);font-size:.85rem}
.empty-state .ei{font-size:2.5rem;margin-bottom:.75rem}

/* ── DRAFT CARD ── */
.draft-card{
  background:var(--ivory);border-radius:14px;border:1px solid var(--line);
  overflow:hidden;transition:box-shadow .18s;
}
.draft-card:hover{box-shadow:0 4px 20px rgba(44,36,32,.09)}
.dc-header{
  display:flex;align-items:flex-start;gap:.75rem;
  padding:.95rem 1.1rem;
}
.dc-info{flex:1;min-width:0}
.dc-title{font-size:.9rem;font-weight:600;color:var(--brown);line-height:1.3}
.dc-meta{font-size:.72rem;color:var(--brown3);margin-top:.2rem}
.dc-author{font-size:.72rem;color:var(--terra);margin-top:.15rem;font-weight:500}
.dc-status{
  font-size:.7rem;font-weight:700;padding:.25rem .7rem;border-radius:100px;
  white-space:nowrap;flex-shrink:0;margin-top:.1rem;
}
.st-submitted{background:#FAE8A0;color:#705010}
.st-reviewed{background:#C0DD97;color:#27500A}
.st-revision{background:#FDDAD9;color:var(--red)}

.dc-preview{
  padding:0 1.1rem .8rem;font-size:.8rem;color:var(--brown2);
  line-height:1.55;border-bottom:1px solid var(--line2);
}

.dc-actions{
  display:flex;align-items:center;gap:.6rem;padding:.65rem 1.1rem;
  flex-wrap:wrap;
}
.btn-toggle-comments{
  background:none;border:none;cursor:pointer;font-size:.78rem;
  color:var(--brown3);padding:.25rem .5rem;border-radius:6px;
  transition:background .15s;display:flex;align-items:center;gap:.3rem;
}
.btn-toggle-comments:hover{background:var(--cream);color:var(--brown2)}
.status-select{
  margin-left:auto;height:30px;padding:0 .6rem;border-radius:8px;
  border:1.5px solid var(--line);background:var(--ivory2);
  font-family:'DM Sans',sans-serif;font-size:.75rem;color:var(--brown2);
  cursor:pointer;outline:none;transition:border-color .15s;
}
.status-select:focus{border-color:var(--terra)}

/* ── COMMENTS ── */
.comments-wrap{border-top:1px solid var(--line2);padding:.85rem 1.1rem}
.comments-list{display:flex;flex-direction:column;gap:.6rem;margin-bottom:.75rem}
.comment-item{
  display:flex;flex-direction:column;gap:.2rem;
  padding:.55rem .7rem;border-radius:8px;background:var(--cream);
  border-left:3px solid var(--line);
}
.comment-item.dosen{border-left-color:var(--terra);background:#FEF9F4}
.comment-item.mahasiswa{border-left-color:var(--sage);background:#F4F7F3}
.comment-item strong{font-size:.78rem;font-weight:600;color:var(--brown)}
.comment-item .role-badge{
  display:inline-block;font-size:.63rem;font-weight:700;
  background:var(--terra);color:#fff;border-radius:4px;
  padding:.1rem .35rem;margin-left:.35rem;vertical-align:middle;
}
.comment-item .comment-time{font-size:.68rem;color:var(--brown3);margin-left:.5rem;font-weight:400}
.comment-item p{font-size:.8rem;color:var(--brown2);line-height:1.5;margin-top:.15rem}

.comment-input-row{display:flex;gap:.5rem;align-items:flex-end}
.comment-input{
  flex:1;border:1.5px solid var(--line);border-radius:8px;
  padding:.5rem .7rem;font-family:'DM Sans',sans-serif;font-size:.82rem;
  color:var(--brown);background:var(--ivory2);outline:none;
  resize:vertical;min-height:54px;transition:border-color .18s;
}
.comment-input:focus{border-color:var(--brown)}
.btn-send-comment{
  height:38px;padding:0 .9rem;border-radius:8px;border:none;
  background:var(--brown);color:var(--terra);
  font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;
  cursor:pointer;transition:all .18s;flex-shrink:0;white-space:nowrap;
}
.btn-send-comment:hover{background:var(--terra);color:#fff}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(44,36,32,.45);
  z-index:400;display:flex;align-items:center;justify-content:center;
  padding:1rem;
}
.modal-card{
  background:var(--ivory);border-radius:16px;padding:1.6rem 1.8rem;
  width:100%;max-width:480px;box-shadow:0 16px 48px rgba(44,36,32,.2);
}
.modal-card h3{
  font-family:'Playfair Display',serif;font-size:1.1rem;
  font-weight:600;color:var(--brown);margin-bottom:1.1rem;
}
.modal-card label{
  display:block;font-size:.75rem;font-weight:600;color:var(--brown2);
  margin-bottom:.75rem;
}
.modal-card label select,
.modal-card label input,
.modal-card label textarea{
  display:block;width:100%;margin-top:.3rem;
  border:1.5px solid var(--line);border-radius:8px;
  background:var(--ivory2);padding:.55rem .8rem;
  font-family:'DM Sans',sans-serif;font-size:.84rem;color:var(--brown);
  outline:none;transition:border-color .18s;
}
.modal-card label select:focus,
.modal-card label input:focus,
.modal-card label textarea:focus{border-color:var(--brown)}
.modal-card label textarea{resize:vertical;min-height:90px}
.modal-actions{display:flex;gap:.6rem;margin-top:1.2rem}
.btn-cancel-modal{
  flex:1;height:40px;border-radius:9px;border:1.5px solid var(--line);
  background:transparent;font-family:'DM Sans',sans-serif;font-size:.84rem;
  color:var(--brown2);cursor:pointer;transition:border-color .15s;
}
.btn-cancel-modal:hover{border-color:var(--brown)}
.btn-submit{
  flex:2;height:40px;border-radius:9px;border:none;
  background:var(--brown);color:var(--terra);
  font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;
  cursor:pointer;transition:all .18s;
}
.btn-submit:hover{background:var(--terra);color:#fff}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

/* ── SPINNER ── */
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:3rem;gap:.5rem;color:var(--brown3);font-size:.82rem}
.sk{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--sage);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .wrap{padding:1rem .85rem 2.5rem}
  .modal-card{padding:1.3rem 1.2rem}
  .dc-actions{gap:.4rem}
  .btn-new-draft{font-size:.75rem;padding:0 .75rem;min-height:44px;height:auto}
  .tab-btn{min-height:44px;height:auto;padding:.5rem .9rem}
  .comment-input{font-size:16px}
  .modal-card label select,
  .modal-card label input,
  .modal-card label textarea{font-size:16px}
}
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <a href="#" class="btn-back" id="btnBack">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Dashboard
  </a>
  <div class="topbar-title" id="pageTitle">Draf Saya</div>
  <span class="draft-count" id="draftCount">0 draf</span>
</div>

<!-- ── MAIN ── -->
<div class="wrap">

  <!-- Filter tabs + New Draft button -->
  <div class="filter-row" id="filterRow">
    <button class="tab-btn active" data-filter="all">Semua</button>
    <button class="tab-btn" data-filter="submitted">Menunggu Review</button>
    <button class="tab-btn" data-filter="reviewed">Sudah Direview</button>
    <button class="tab-btn" data-filter="revision">Perlu Revisi</button>
    <!-- button New Draft injected by JS for mahasiswa view -->
  </div>

  <!-- Draft list -->
  <div id="draftList">
    <div class="spinner-wrap"><div class="sk"></div> Memuat draf...</div>
  </div>

</div>

<!-- ── MODAL: Draf Baru ── -->
<div class="modal-overlay" id="draftModal" style="display:none">
  <div class="modal-card">
    <h3>Kirim Draf Baru</h3>
    <label>Modul
      <select id="draftModul"></select>
    </label>
    <label>Judul
      <input id="draftTitle" placeholder="Judul draf..." maxlength="120">
    </label>
    <label>Konten / Ringkasan
      <textarea id="draftContent" rows="5" placeholder="Tulis konten draf atau ringkasan..."></textarea>
    </label>
    <div class="modal-actions">
      <button class="btn-cancel-modal" id="btnCancelDraft">Batal</button>
      <button class="btn-submit" id="btnSubmitDraft">Kirim Draf</button>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="modules-data.js"></script>
<script src="data-layer.js"></script>
<script>
'use strict';

// ── Auth guard ─────────────────────────────────────────────────
(async () => {
  if (typeof sb === 'undefined') return;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.replace('index.html'); return; }
  } catch(e) {}
})();

// ── View mode ──────────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const IS_DOSEN = params.get('view') === 'dosen';

// ── Helpers ────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    const m = Math.floor(diff/60000), h = Math.floor(m/60), days = Math.floor(h/24);
    if (diff < 60000) return 'baru saja';
    if (m < 60) return m + ' menit lalu';
    if (h < 24) return h + ' jam lalu';
    if (days < 7) return days + ' hari lalu';
    return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
  } catch(e) { return iso; }
}

const STATUS_LABEL = { submitted:'Menunggu Review', reviewed:'Sudah Direview', revision:'Perlu Revisi' };
const STATUS_CLS   = { submitted:'st-submitted', reviewed:'st-reviewed', revision:'st-revision' };

// ── State ──────────────────────────────────────────────────────
let allDrafts = [];
let activeFilter = 'all';

// ── Render ─────────────────────────────────────────────────────
function renderDraftCard(d) {
  const statusCls   = STATUS_CLS[d.status] || 'st-submitted';
  const statusLabel = STATUS_LABEL[d.status] || d.status;
  const comments    = d.comments || [];

  const statusSelectHtml = IS_DOSEN ? `
    <select class="status-select" data-did="${escHtml(d.id)}">
      <option value="submitted" ${d.status==='submitted'?'selected':''}>Menunggu Review</option>
      <option value="reviewed"  ${d.status==='reviewed' ?'selected':''}>Sudah Direview</option>
      <option value="revision"  ${d.status==='revision' ?'selected':''}>Perlu Revisi</option>
    </select>` : '';

  const commentsHtml = comments.map(c => `
    <div class="comment-item ${escHtml(c.authorRole||'mahasiswa')}">
      <div>
        <strong>${escHtml(c.authorName)}</strong>${c.authorRole==='dosen'?'<span class="role-badge">Dosen</span>':''}
        <span class="comment-time">${formatDate(c.createdAt)}</span>
      </div>
      <p>${escHtml(c.text)}</p>
    </div>
  `).join('');

  const authorRow = IS_DOSEN ? `<div class="dc-author">oleh ${escHtml(d.authorName)}</div>` : '';
  const preview   = (d.content||'').slice(0,140) + ((d.content||'').length>140?'...':'');

  return `<div class="draft-card" id="dc-${escHtml(d.id)}">
    <div class="dc-header">
      <div class="dc-info">
        <div class="dc-title">${escHtml(d.title)}</div>
        <div class="dc-meta">${escHtml(d.moduleName)} &middot; v${d.version||1} &middot; ${formatDate(d.submittedAt)}</div>
        ${authorRow}
      </div>
      <span class="dc-status ${statusCls}">${statusLabel}</span>
    </div>
    <div class="dc-preview">${escHtml(preview)}</div>
    <div class="dc-actions">
      <button class="btn-toggle-comments" data-did="${escHtml(d.id)}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        ${comments.length} Komentar
      </button>
      ${statusSelectHtml}
    </div>
    <div class="comments-wrap" id="cw-${escHtml(d.id)}" style="display:none">
      <div class="comments-list" id="cl-${escHtml(d.id)}">
        ${commentsHtml || '<div style="font-size:.78rem;color:var(--brown3);padding:.25rem 0">Belum ada komentar.</div>'}
      </div>
      <div class="comment-input-row">
        <textarea class="comment-input" id="ci-${escHtml(d.id)}" rows="2" placeholder="Tulis komentar..."></textarea>
        <button class="btn-send-comment" data-did="${escHtml(d.id)}" data-role="${IS_DOSEN?'dosen':'mahasiswa'}">Kirim</button>
      </div>
    </div>
  </div>`;
}

function renderList() {
  const filtered = activeFilter === 'all'
    ? allDrafts
    : allDrafts.filter(d => d.status === activeFilter);

  const list = document.getElementById('draftList');
  if (!list) return;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="ei">📄</div>
      <div>${activeFilter==='all' ? 'Belum ada draf. Klik "+ Draf Baru" untuk mulai.' : 'Tidak ada draf dengan status ini.'}</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(d => renderDraftCard(d)).join('');
  attachCardEvents();
}

function attachCardEvents() {
  // Toggle comments
  document.querySelectorAll('.btn-toggle-comments').forEach(btn => {
    btn.addEventListener('click', () => {
      const did  = btn.dataset.did;
      const wrap = document.getElementById('cw-' + did);
      if (wrap) wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
    });
  });

  // Send comment
  document.querySelectorAll('.btn-send-comment').forEach(btn => {
    btn.addEventListener('click', async () => {
      const did  = btn.dataset.did;
      const role = btn.dataset.role;
      const input = document.getElementById('ci-' + did);
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      btn.disabled = true;
      try {
        await DataLayer.addDraftComment(did, { text, authorRole: role });
        input.value = '';
        // Reload drafts and re-render
        allDrafts = await DataLayer.getDrafts();
        renderList();
        // Re-open the comments panel for this draft
        const wrap = document.getElementById('cw-' + did);
        if (wrap) wrap.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    });
  });

  // Status select (dosen only)
  document.querySelectorAll('.status-select').forEach(sel => {
    sel.addEventListener('change', async () => {
      const did    = sel.dataset.did;
      const status = sel.value;
      try {
        await DataLayer.updateDraftStatus(did, status);
        allDrafts = await DataLayer.getDrafts();
        renderList();
      } catch(e) { console.warn('[draf] updateDraftStatus gagal:', e); }
    });
  });
}

// ── Page setup ─────────────────────────────────────────────────
function setupPage() {
  // Topbar
  const backBtn = document.getElementById('btnBack');
  if (IS_DOSEN) {
    document.getElementById('pageTitle').textContent = 'Asistensi Draf Mahasiswa';
    if (backBtn) backBtn.href = 'dashboard-dos.html';
  } else {
    document.getElementById('pageTitle').textContent = 'Draf Saya';
    if (backBtn) backBtn.href = 'dashboard-mhs.html';
  }

  // New Draft button (mahasiswa only)
  if (!IS_DOSEN) {
    const filterRow = document.getElementById('filterRow');
    const newBtn = document.createElement('button');
    newBtn.className = 'btn-new-draft';
    newBtn.id = 'btnNewDraft';
    newBtn.textContent = '+ Draf Baru';
    newBtn.addEventListener('click', openDraftModal);
    filterRow.appendChild(newBtn);
  }

  // Filter tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderList();
    });
  });
}

// ── Module select ─────────────────────────────────────────────
async function populateModulSelect() {
  const sel = document.getElementById('draftModul');
  if (!sel) return;
  try {
    const modules = await DataLayer.getModules();
    sel.innerHTML = modules.map(m =>
      `<option value="${m.id}" data-name="${escHtml(m.title)}">${m.id}. ${escHtml(m.title)}</option>`
    ).join('');
  } catch(e) {
    sel.innerHTML = '<option value="1">Modul 1</option>';
  }
}

// ── Modal ──────────────────────────────────────────────────────
function openDraftModal() {
  populateModulSelect();
  document.getElementById('draftTitle').value = '';
  document.getElementById('draftContent').value = '';
  document.getElementById('draftModal').style.display = 'flex';
}

document.getElementById('btnCancelDraft')?.addEventListener('click', () => {
  document.getElementById('draftModal').style.display = 'none';
});

document.getElementById('draftModal')?.addEventListener('click', e => {
  if (e.target === document.getElementById('draftModal')) {
    document.getElementById('draftModal').style.display = 'none';
  }
});

document.getElementById('btnSubmitDraft')?.addEventListener('click', async () => {
  const sel     = document.getElementById('draftModul');
  const title   = document.getElementById('draftTitle').value.trim();
  const content = document.getElementById('draftContent').value.trim();

  if (!title || !content) {
    alert('Judul dan konten wajib diisi.');
    return;
  }

  const moduleId   = parseInt(sel.value, 10);
  const moduleName = sel.options[sel.selectedIndex]?.dataset.name || 'Modul ' + moduleId;

  const submitBtn = document.getElementById('btnSubmitDraft');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Mengirim...';

  try {
    const profile = await DataLayer.getProfile();
    await DataLayer.submitDraft({
      moduleId,
      moduleName,
      authorName: profile.name || profile.full_name || 'Mahasiswa',
      title,
      content,
    });
    document.getElementById('draftModal').style.display = 'none';
    allDrafts = await DataLayer.getDrafts();
    updateCountBadge();
    renderList();
  } catch(e) {
    alert('Gagal mengirim draf. Silakan coba lagi.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Kirim Draf';
  }
});

// ── Count badge ────────────────────────────────────────────────
function updateCountBadge() {
  const el = document.getElementById('draftCount');
  if (el) el.textContent = allDrafts.length + ' draf';
}

// ── Init ───────────────────────────────────────────────────────
(async () => {
  setupPage();
  try {
    allDrafts = await DataLayer.getDrafts();
  } catch(e) {
    allDrafts = [];
  }
  updateCountBadge();
  renderList();
})();
</script>
</body>
</html>
