<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Diskusi — SMART-FLIP 5.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="modules-data.js"></script>
<script src="data-layer.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F2E9;--ivory:#FFFDF8;--ivory2:#FAF7F2;
  --sage:#8FA287;--sage-d:#6B7E64;--sage-bg:#EBF0E7;
  --terra:#C8925A;--terra-d:#A87040;
  --brown:#2C2420;--brown2:#4A3D33;--brown3:#7A6B5E;
  --line:#DDD5C4;--line2:#EDE8DF;
  --border:rgba(44,36,32,.12);
  --err:#B03020;
  --hh:54px;
}
body{
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  color:var(--brown);
  min-height:100vh;
}

/* ── TOPBAR ── */
.topbar{
  background:var(--brown);color:#fff;
  height:var(--hh);padding:0 16px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(44,36,32,.2);
}
.btn-back{
  color:rgba(255,255,255,.7);text-decoration:none;
  font-size:14px;font-weight:500;
  padding:6px 8px;border-radius:7px;
  transition:all .15s;flex-shrink:0;white-space:nowrap;
}
.btn-back:hover{background:rgba(255,255,255,.1);color:#fff}
.topbar-title{
  font-family:'Playfair Display',serif;
  font-size:1.05rem;font-weight:600;flex:1;color:#fff;
}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.5);flex-shrink:0;white-space:nowrap}

/* ── FILTER TABS ── */
.forum-tabs{
  display:flex;gap:8px;overflow-x:auto;
  padding:14px 16px 0;
  scrollbar-width:none;-ms-overflow-style:none;
}
.forum-tabs::-webkit-scrollbar{display:none}
.tab-btn{
  padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--line);background:var(--ivory);
  font-family:'DM Sans',sans-serif;font-size:13px;
  cursor:pointer;white-space:nowrap;color:var(--brown2);
  transition:all .15s;flex-shrink:0;
}
.tab-btn:hover{border-color:var(--brown3);color:var(--brown)}
.tab-btn.active{background:var(--terra);color:#fff;border-color:var(--terra)}

/* ── MAIN WRAP ── */
.main-wrap{max-width:700px;margin:0 auto;padding:16px 16px 32px}

/* ── NEW POST CARD ── */
.new-post-card{
  background:var(--ivory);border-radius:14px;
  border:1px solid var(--line);padding:16px;
  margin-bottom:14px;
  box-shadow:0 1px 4px rgba(44,36,32,.05);
}
.np-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.np-avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--terra);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
}
.np-modul-select{
  flex:1;height:36px;padding:0 10px;
  border:1.5px solid var(--line);border-radius:8px;
  background:var(--ivory2);font-family:'DM Sans',sans-serif;
  font-size:13px;color:var(--brown);outline:none;
  cursor:pointer;transition:border-color .15s;
}
.np-modul-select:focus{border-color:var(--terra)}
.np-textarea{
  width:100%;min-height:86px;padding:10px 12px;
  border:1.5px solid var(--line);border-radius:9px;
  background:var(--ivory2);font-family:'DM Sans',sans-serif;
  font-size:14px;color:var(--brown);resize:vertical;outline:none;
  line-height:1.55;transition:border-color .15s,box-shadow .15s;
}
.np-textarea:focus{border-color:var(--terra);box-shadow:0 0 0 3px rgba(200,146,90,.08)}
.np-textarea::placeholder{color:var(--brown3)}
.np-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.np-char{font-size:12px;color:var(--brown3)}
.np-char.warn{color:var(--err)}
.btn-post-submit{
  height:36px;padding:0 20px;border-radius:9px;border:none;
  background:var(--terra);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:background .15s,opacity .15s;
}
.btn-post-submit:hover{background:var(--terra-d)}
.btn-post-submit:disabled{opacity:.5;cursor:not-allowed}

/* ── POST LIST ── */
.post-list{display:flex;flex-direction:column;gap:12px}

/* ── POST CARD ── */
.post-card{
  background:var(--ivory);border-radius:12px;
  border:1px solid var(--line);padding:16px;
  box-shadow:0 1px 4px rgba(44,36,32,.04);
}
.post-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.post-av{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
}
.post-meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px;font-size:13px;min-width:0}
.post-meta strong{color:var(--brown);font-weight:600}
.role-badge{
  font-size:11px;font-weight:600;padding:2px 7px;border-radius:100px;flex-shrink:0;
}
.role-badge.dosen{background:var(--sage-bg);color:var(--sage-d)}
.post-modul-tag{
  font-size:11px;background:var(--cream);border:1px solid var(--line);
  color:var(--brown2);padding:2px 8px;border-radius:100px;font-weight:600;flex-shrink:0;
}
.post-time{font-size:12px;color:var(--brown3);flex-shrink:0}
.post-content{font-size:14px;line-height:1.62;color:var(--brown2);margin-bottom:12px;word-break:break-word;white-space:pre-wrap}
.post-actions{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--line2)}
.post-actions button{
  display:inline-flex;align-items:center;gap:5px;
  background:transparent;border:1px solid var(--line);border-radius:20px;
  padding:4px 13px;font-family:'DM Sans',sans-serif;font-size:13px;
  cursor:pointer;color:var(--brown3);transition:all .15s;height:30px;
}
.post-actions button:hover{border-color:var(--brown3);background:var(--cream)}
.btn-like.liked{background:rgba(200,146,90,.1);border-color:var(--terra);color:var(--terra-d);font-weight:600}
.btn-toggle-reply.open{background:rgba(143,162,135,.1);border-color:var(--sage-d);color:var(--sage-d)}

/* ── REPLIES ── */
.replies-wrap{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--line2)}
.reply-card{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--line2)}
.reply-card:last-of-type{border-bottom:none}
.reply-av{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px;
}
.reply-body{flex:1;min-width:0}
.reply-meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-bottom:3px;font-size:12px}
.reply-meta strong{color:var(--brown);font-weight:600}
.reply-time{color:var(--brown3)}
.reply-content{font-size:13px;line-height:1.55;color:var(--brown2);word-break:break-word;white-space:pre-wrap}
.reply-input-row{display:flex;gap:8px;margin-top:12px}
.reply-input{
  flex:1;height:38px;padding:0 12px;
  border:1.5px solid var(--line);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:13px;
  color:var(--brown);background:var(--ivory2);outline:none;
  transition:border-color .15s;
}
.reply-input:focus{border-color:var(--terra)}
.reply-input::placeholder{color:var(--brown3)}
.btn-send-reply{
  height:38px;padding:0 14px;border-radius:8px;border:none;
  background:var(--brown);color:var(--terra);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;flex-shrink:0;white-space:nowrap;
}
.btn-send-reply:hover{background:var(--terra);color:#fff}
.btn-send-reply:disabled{opacity:.5;cursor:not-allowed}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--brown3)}
.empty-state .es-icon{font-size:2.6rem;margin-bottom:10px;display:block}
.empty-state p{font-size:14px;line-height:1.5}

/* ── SPINNER ── */
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--brown3);font-size:13px;gap:8px}
.sk{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--sage);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--brown);color:var(--terra);
  padding:10px 20px;border-radius:10px;
  font-size:13px;font-weight:600;
  z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.2);
  transition:transform .28s ease;pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .main-wrap{padding:12px 12px 28px}
  .np-textarea{font-size:16px}
  .np-modul-select{font-size:16px}
  .reply-input{font-size:16px}
  .post-content{font-size:13px}
  .topbar-sub{display:none}
  .reply-input-row{flex-wrap:wrap}
  .btn-send-reply{width:100%}
  .post-actions button{min-height:44px;height:auto;padding:8px 13px}
}
@media(max-width:400px){
  .topbar{padding:0 10px;gap:8px}
  .topbar-title{font-size:.95rem}
  .new-post-card,.post-card{padding:12px}
}
</style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<div class="topbar">
  <a href="dashboard-mhs.html" class="btn-back">← Dashboard</a>
  <h1 class="topbar-title">Forum Diskusi</h1>
  <span class="topbar-sub" id="postCount"></span>
</div>

<!-- ══ FILTER TABS ══ -->
<div class="forum-tabs" id="forumTabs"></div>

<!-- ══ MAIN ══ -->
<div class="main-wrap">

  <!-- New Post Card -->
  <div class="new-post-card">
    <div class="np-head">
      <div class="np-avatar" id="npAv">?</div>
      <select id="npModul" class="np-modul-select"></select>
    </div>
    <textarea id="newPostText" class="np-textarea"
      placeholder="Tulis pertanyaan, insight, atau pengalaman belajarmu..."
      maxlength="500"></textarea>
    <div class="np-footer">
      <span class="np-char" id="npChar">0 / 500</span>
      <button id="btnPost" class="btn-post-submit">Kirim</button>
    </div>
  </div>

  <!-- Post List -->
  <div id="postList" class="post-list">
    <div class="spinner-wrap"><div class="sk"></div> Memuat diskusi...</div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';

// ── Auth guard ──
(async () => {
  if (typeof sb === 'undefined') return;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.replace('index.html'); return; }
  } catch(e) {}
})();

// ── Helpers ──
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const MONTHS_ID = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
function timeAgo(iso) {
  try {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(m / 60);
    const d = Math.floor(h / 24);
    if (diff < 60000) return 'baru saja';
    if (m < 60) return m + ' menit lalu';
    if (h < 24) return h + ' jam lalu';
    const dt = new Date(iso);
    return dt.getDate() + ' ' + MONTHS_ID[dt.getMonth()] + ' ' + dt.getFullYear();
  } catch(e) { return ''; }
}

const AVATAR_COLORS = ['#5A7353','#C8925A','#4A7EA0','#8FA287','#A87040','#6B5D4F','#3D6B58','#7A5A8C'];
function avatarColor(name) {
  let h = 0;
  for (const c of String(name)) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function initials(name) {
  return (name || '?').split(' ').slice(0,2).map(w => w[0] || '').join('').toUpperCase() || '?';
}

function showToast(msg, dur = 2400) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), dur);
}

// ── State ──
let currentModulFilter = null; // null = semua, Number = module id
let allModules = [];

// ── Render helpers ──
function replyHTML(r) {
  const col = avatarColor(r.authorName);
  const badge = r.authorRole === 'dosen' ? '<span class="role-badge dosen">Dosen</span>' : '';
  return `<div class="reply-card">
    <div class="reply-av" style="background:${col}">${escHtml(initials(r.authorName))}</div>
    <div class="reply-body">
      <div class="reply-meta">
        <strong>${escHtml(r.authorName)}</strong>${badge}
        <span class="reply-time">${timeAgo(r.createdAt)}</span>
      </div>
      <div class="reply-content">${escHtml(r.content)}</div>
    </div>
  </div>`;
}

function postCardHTML(p) {
  const mod = allModules.find(m => m.id === p.moduleId);
  const modLabel = mod
    ? 'Modul ' + p.moduleId + ': ' + mod.title.split(' ').slice(0,4).join(' ')
    : 'Modul ' + p.moduleId;
  const col = avatarColor(p.authorName);
  const badge = p.authorRole === 'dosen' ? '<span class="role-badge dosen">Dosen</span>' : '';
  const repliesHtml = (p.replies || []).map(replyHTML).join('');
  const rc = (p.replies || []).length;
  return `<div class="post-card">
    <div class="post-head">
      <div class="post-av" style="background:${col}">${escHtml(initials(p.authorName))}</div>
      <div class="post-meta">
        <strong>${escHtml(p.authorName)}</strong>${badge}
        <span class="post-modul-tag">${escHtml(modLabel)}</span>
        <span class="post-time">${timeAgo(p.createdAt)}</span>
      </div>
    </div>
    <div class="post-content">${escHtml(p.content)}</div>
    <div class="post-actions">
      <button class="btn-like" data-pid="${escHtml(p.id)}">👍 ${p.likes || 0}</button>
      <button class="btn-toggle-reply" data-pid="${escHtml(p.id)}">💬 Balas${rc ? ' (' + rc + ')' : ''}</button>
    </div>
    <div class="replies-wrap" id="rw-${escHtml(p.id)}">
      ${repliesHtml}
      <div class="reply-input-row">
        <input class="reply-input" id="ri-${escHtml(p.id)}" placeholder="Tulis balasan..." maxlength="300">
        <button class="btn-send-reply" data-pid="${escHtml(p.id)}">Kirim</button>
      </div>
    </div>
  </div>`;
}

async function renderPosts() {
  const posts = await DataLayer.getPosts(currentModulFilter);
  const list = document.getElementById('postList');
  const countEl = document.getElementById('postCount');
  if (countEl) countEl.textContent = posts.length + ' diskusi';
  if (!list) return;
  if (!posts.length) {
    list.innerHTML = `<div class="empty-state">
      <span class="es-icon">💬</span>
      <p>Belum ada diskusi di sini.<br>Jadilah yang pertama memulai!</p>
    </div>`;
    return;
  }
  list.innerHTML = posts.map(postCardHTML).join('');
}

function buildTabs() {
  const tabs = document.getElementById('forumTabs');
  if (!tabs) return;
  const items = [
    { id: null, label: 'Semua' },
    ...allModules.map(m => ({ id: m.id, label: 'M' + m.id }))
  ];
  tabs.innerHTML = items.map(t =>
    `<button class="tab-btn${t.id === currentModulFilter ? ' active' : ''}" data-mid="${t.id === null ? 'all' : t.id}">${escHtml(t.label)}</button>`
  ).join('');
  tabs.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentModulFilter = btn.dataset.mid === 'all' ? null : Number(btn.dataset.mid);
      tabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPosts();
    });
  });
}

function buildModulSelect() {
  const sel = document.getElementById('npModul');
  if (!sel) return;
  sel.innerHTML = allModules.map(m =>
    `<option value="${m.id}">Modul ${m.id}: ${escHtml(m.title.slice(0,46))}</option>`
  ).join('');
}

// ── Event delegation on post list ──
document.getElementById('postList').addEventListener('click', async e => {
  const tgt = e.target.closest('[data-pid]');
  if (!tgt) return;
  const pid = tgt.dataset.pid;

  if (tgt.classList.contains('btn-like')) {
    try {
      await DataLayer.likePost(pid);
      await renderPosts();
      // Reopen replies if was open
      const rw = document.getElementById('rw-' + pid);
      if (rw && rw.style.display === 'block') rw.style.display = 'block';
    } catch(e) { console.warn('[forum] likePost gagal:', e); }
    return;
  }

  if (tgt.classList.contains('btn-toggle-reply')) {
    const rw = document.getElementById('rw-' + pid);
    if (!rw) return;
    const isOpen = rw.style.display === 'block';
    rw.style.display = isOpen ? 'none' : 'block';
    tgt.classList.toggle('open', !isOpen);
    if (!isOpen) {
      const ri = document.getElementById('ri-' + pid);
      if (ri) setTimeout(() => ri.focus(), 50);
    }
    return;
  }

  if (tgt.classList.contains('btn-send-reply')) {
    const input = document.getElementById('ri-' + pid);
    const content = input?.value?.trim();
    if (!content || content.length < 3) { input?.focus(); return; }
    tgt.disabled = true;
    try {
      await DataLayer.addReply(pid, { content });
      input.value = '';
      tgt.disabled = false;
      await renderPosts();
      // Reopen replies panel
      const rw = document.getElementById('rw-' + pid);
      if (rw) rw.style.display = 'block';
      const rt = document.querySelector(`.btn-toggle-reply[data-pid="${pid}"]`);
      if (rt) rt.classList.add('open');
      showToast('Balasan terkirim!');
    } catch(e) {
      console.warn('[forum] addReply gagal:', e);
      tgt.disabled = false;
    }
    return;
  }
});

// ── Reply input — Enter key ──
document.getElementById('postList').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const input = e.target.closest('.reply-input');
  if (!input) return;
  const pid = input.id.replace('ri-', '');
  const btn = document.querySelector(`.btn-send-reply[data-pid="${pid}"]`);
  if (btn) btn.click();
});

// ── Char counter ──
const textarea = document.getElementById('newPostText');
const charEl   = document.getElementById('npChar');
textarea?.addEventListener('input', () => {
  if (!charEl) return;
  const len = textarea.value.length;
  charEl.textContent = len + ' / 500';
  charEl.classList.toggle('warn', len > 450);
});

// ── New post submit ──
document.getElementById('btnPost')?.addEventListener('click', async () => {
  const content = textarea?.value?.trim();
  const modulId = Number(document.getElementById('npModul')?.value);
  if (!content || content.length < 10) {
    showToast('Tulisan minimal 10 karakter.');
    textarea?.focus();
    return;
  }
  const btn = document.getElementById('btnPost');
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await DataLayer.addPost({ moduleId: modulId, content });
    if (textarea) textarea.value = '';
    if (charEl) charEl.textContent = '0 / 500';
    currentModulFilter = null;
    buildTabs();
    await renderPosts();
    document.getElementById('postList')?.scrollIntoView({ behavior:'smooth', block:'start' });
    showToast('Postingan berhasil dikirim!');
  } catch(err) {
    showToast('Gagal mengirim. Coba lagi.');
  }
  btn.disabled = false;
  btn.textContent = 'Kirim';
});

// ── Init ──
(async () => {
  try {
    allModules = await DataLayer.getModules();
  } catch(e) {
    console.warn('[forum] getModules gagal:', e);
    allModules = [];
  }

  // Avatar dari profil
  try {
    const profile = await DataLayer.getProfile();
    const avEl = document.getElementById('npAv');
    if (avEl && profile) {
      const name = profile.name || profile.full_name || 'Mahasiswa';
      avEl.textContent = initials(name);
      avEl.style.background = avatarColor(name);
    }
  } catch(e) {}

  buildTabs();
  buildModulSelect();
  try {
    await renderPosts();
  } catch(e) { console.warn('[forum] renderPosts init gagal:', e); }
})();
</script>
</body>
</html>
