<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panduan Workshop — SMART-FLIP 5.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="supabase.js" onerror="console.warn('supabase.js not found — demo mode')"></script>
<script src="modules-data.js" onerror="console.warn('modules-data.js not found')"></script>
<script src="data-layer.js" onerror="console.warn('data-layer.js not found')"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F2E9;--ivory:#FFFDF8;--ivory2:#FAF7F2;
  --sage:#8FA287;--sage-d:#6B7E64;--sage-bg:#EBF0E7;
  --terra:#D4A373;--terra-d:#B8855A;
  --brown:#3E362E;--brown2:#6B5D4F;--brown3:#9B8B7A;
  --border:rgba(62,54,46,.10);
  --line:#DDD5C4;--line2:#EDE8DF;
  --hh:54px;--r:10px;
}
html{scroll-behavior:smooth}
body{
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  color:var(--brown);
  min-height:100vh;
}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--brown);
  display:flex;align-items:center;gap:.6rem;
  padding:0 1rem;height:var(--hh);
}
.tb-back{
  display:flex;align-items:center;gap:.4rem;
  color:rgba(255,255,255,.65);font-size:.85rem;font-weight:500;
  text-decoration:none;padding:.3rem .6rem;border-radius:6px;
  transition:all .18s;flex-shrink:0;
}
.tb-back:hover{background:rgba(255,255,255,.1);color:#fff}
.tb-back svg{width:16px;height:16px;flex-shrink:0}
.tb-title{
  font-family:'Playfair Display',serif;
  font-size:.95rem;color:var(--terra);
  font-weight:600;letter-spacing:.02em;
  flex-shrink:0;
}
.tb-spacer{flex:1}
.modul-selector{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  color:#fff;border-radius:8px;
  padding:.35rem .7rem;font-size:.8rem;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;outline:none;
  max-width:200px;
}
.modul-selector:focus{border-color:rgba(212,163,115,.5)}
.modul-selector option{background:var(--brown);color:#fff}
.btn-print{
  display:flex;align-items:center;gap:.4rem;
  background:var(--terra);color:#fff;
  border:none;border-radius:8px;padding:.4rem .8rem;
  font-size:.8rem;font-weight:600;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .18s;flex-shrink:0;white-space:nowrap;
}
.btn-print:hover{background:var(--terra-d)}
.btn-print svg{width:15px;height:15px}

/* ── MAIN ── */
.main{
  max-width:860px;margin:0 auto;
  padding:2rem 1.2rem 4rem;
}

/* ── HERO ── */
.hero{
  background:var(--brown);
  border-radius:var(--r);
  padding:2rem 2rem 1.6rem;
  margin-bottom:1.5rem;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 0%,rgba(212,163,115,.18) 0%,transparent 60%);
  pointer-events:none;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(143,162,135,.2);border:1px solid rgba(143,162,135,.35);
  color:var(--sage);font-size:.72rem;font-weight:600;
  letter-spacing:.08em;border-radius:100px;
  padding:.25rem .75rem;margin-bottom:1rem;
}
.hero-badge span{font-size:1em}
.hero-modul-num{
  font-size:.8rem;font-weight:600;
  color:var(--terra);letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:.3rem;
}
.hero-title{
  font-family:'Playfair Display',serif;
  font-size:1.7rem;color:#fff;font-weight:700;
  line-height:1.25;margin-bottom:.5rem;
}
.hero-meta{
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  margin-top:.8rem;
}
.hero-durasi{
  display:flex;align-items:center;gap:.4rem;
  color:rgba(255,255,255,.55);font-size:.83rem;
}
.hero-durasi svg{width:15px;height:15px;opacity:.7}

/* ── TAB NAV ── */
.tab-nav{
  display:flex;gap:.25rem;
  background:var(--ivory);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:.35rem;
  margin-bottom:1.25rem;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{
  flex:1 0 auto;
  display:flex;align-items:center;justify-content:center;
  gap:.4rem;white-space:nowrap;
  padding:.55rem 1rem;border-radius:7px;
  border:none;background:transparent;
  color:var(--brown3);font-size:.83rem;font-weight:500;
  font-family:'DM Sans',sans-serif;cursor:pointer;
  transition:all .18s;
}
.tab-btn:hover{background:var(--cream);color:var(--brown2)}
.tab-btn.active{
  background:var(--brown);color:#fff;
  font-weight:600;
}
.tab-btn svg{width:15px;height:15px;flex-shrink:0}

/* ── CARD ── */
.ws-card{
  background:var(--ivory);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:1.75rem;
  margin-bottom:1rem;
}
.ws-card-title{
  font-family:'Playfair Display',serif;
  font-size:1.1rem;font-weight:700;
  color:var(--brown);margin-bottom:1.2rem;
  padding-bottom:.75rem;
  border-bottom:1px solid var(--line2);
}

/* ── TAB TUJUAN ── */
.tujuan-list{list-style:none;display:flex;flex-direction:column;gap:.6rem}
.tujuan-item{
  display:flex;align-items:flex-start;gap:.75rem;
  padding:.75rem 1rem;
  background:var(--cream);border-radius:8px;
  border-left:3px solid var(--sage);
}
.tujuan-icon{
  width:22px;height:22px;border-radius:50%;
  background:var(--sage);color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:.7rem;font-weight:700;
  margin-top:.05rem;
}
.tujuan-text{font-size:.9rem;line-height:1.5;color:var(--brown2)}

/* ── TAB AKTIVITAS ── */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:0 1.25rem;
  position:relative;
}
.tl-item:not(:last-child) .tl-right::before{
  content:'';
  position:absolute;
  left:calc(120px + 1.25rem + 9px);
  top:24px;bottom:0;width:2px;
  background:var(--line2);
}
.tl-left{
  display:flex;flex-direction:column;
  align-items:flex-end;
  padding-bottom:1.5rem;
  padding-top:.15rem;
}
.tl-time{
  font-size:.72rem;font-weight:600;
  color:var(--terra-d);letter-spacing:.03em;
  text-align:right;line-height:1.3;
  white-space:nowrap;
}
.tl-right{
  position:relative;
  padding-bottom:1.5rem;
  padding-left:1.5rem;
}
.tl-dot{
  position:absolute;left:0;top:.15rem;
  width:20px;height:20px;border-radius:50%;
  background:var(--ivory);border:2.5px solid var(--terra);
  display:flex;align-items:center;justify-content:center;
  z-index:1;
  transform:translateX(-50%);
}
.tl-dot-inner{
  width:7px;height:7px;border-radius:50%;
  background:var(--terra);
}
.tl-nama{
  font-weight:600;font-size:.92rem;
  color:var(--brown);margin-bottom:.35rem;
}
.tl-desc{
  font-size:.85rem;line-height:1.55;
  color:var(--brown2);margin-bottom:.4rem;
}
.tl-peran{
  display:inline-flex;align-items:center;gap:.3rem;
  font-size:.72rem;font-weight:600;letter-spacing:.04em;
  color:var(--terra-d);background:rgba(212,163,115,.12);
  border:1px solid rgba(212,163,115,.25);
  border-radius:100px;padding:.2rem .6rem;
}

/* ── TAB CHECKLIST ── */
.cl-list{display:flex;flex-direction:column;gap:.5rem}
.cl-item{
  display:flex;align-items:center;gap:.85rem;
  min-height:44px;padding:.65rem 1rem;
  background:var(--cream);border-radius:8px;
  cursor:pointer;transition:all .15s;
  border:1px solid transparent;
}
.cl-item:hover{background:var(--ivory2);border-color:var(--line)}
.cl-item.done{background:var(--sage-bg);border-color:rgba(143,162,135,.25)}
.cl-checkbox{
  width:20px;height:20px;border-radius:5px;
  border:2px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;background:#fff;
}
.cl-item.done .cl-checkbox{
  background:var(--sage);border-color:var(--sage);
}
.cl-checkbox svg{width:11px;height:11px;color:#fff;opacity:0;transition:opacity .15s}
.cl-item.done .cl-checkbox svg{opacity:1}
.cl-text{font-size:.88rem;line-height:1.4;color:var(--brown2);user-select:none}
.cl-item.done .cl-text{text-decoration:line-through;color:var(--brown3)}
.cl-progress{
  display:flex;align-items:center;gap:.75rem;
  margin-bottom:1rem;
}
.cl-progress-bar{
  flex:1;height:6px;background:var(--line2);border-radius:3px;overflow:hidden;
}
.cl-progress-fill{height:100%;background:var(--sage);border-radius:3px;transition:width .3s ease}
.cl-progress-text{font-size:.78rem;font-weight:600;color:var(--sage);white-space:nowrap}
.cl-reset{
  margin-top:1rem;
  background:transparent;border:1px solid var(--line);
  color:var(--brown3);font-size:.78rem;font-family:'DM Sans',sans-serif;
  padding:.35rem .75rem;border-radius:6px;cursor:pointer;
  transition:all .15s;
}
.cl-reset:hover{border-color:var(--brown3);color:var(--brown2)}

/* ── TAB LEMBAR KERJA ── */
.lk-instruksi{
  font-size:.88rem;line-height:1.6;color:var(--brown2);
  background:rgba(212,163,115,.08);border:1px solid rgba(212,163,115,.2);
  border-left:3px solid var(--terra);
  border-radius:0 8px 8px 0;padding:.85rem 1rem;margin-bottom:1.5rem;
}
.lk-q-list{display:flex;flex-direction:column;gap:1.1rem}
.lk-q-item{display:flex;flex-direction:column;gap:.5rem}
.lk-q-num{
  font-size:.78rem;font-weight:700;letter-spacing:.06em;
  color:var(--terra-d);text-transform:uppercase;
}
.lk-q-text{font-size:.88rem;font-weight:500;color:var(--brown);line-height:1.4}
.lk-textarea{
  width:100%;min-height:80px;
  background:var(--cream);border:1px solid var(--line);
  border-radius:8px;padding:.65rem .85rem;
  font-size:.85rem;line-height:1.55;
  color:var(--brown);font-family:'DM Sans',sans-serif;
  resize:vertical;outline:none;transition:border-color .18s;
}
.lk-textarea:focus{border-color:var(--terra);background:var(--ivory)}
.lk-actions{
  display:flex;gap:.6rem;margin-top:1.5rem;flex-wrap:wrap;
}
.lk-btn{
  display:flex;align-items:center;gap:.4rem;
  padding:.55rem 1rem;border-radius:8px;
  font-size:.83rem;font-weight:600;font-family:'DM Sans',sans-serif;
  cursor:pointer;border:none;transition:all .18s;
}
.lk-btn-primary{background:var(--brown);color:#fff}
.lk-btn-primary:hover{background:var(--brown2)}
.lk-btn-secondary{background:var(--cream);border:1px solid var(--line);color:var(--brown2)}
.lk-btn-secondary:hover{background:var(--ivory2);border-color:var(--brown3)}
.lk-btn svg{width:14px;height:14px}

/* ── PREV / NEXT NAV ── */
.modul-nav{
  display:flex;gap:.75rem;margin-top:2rem;
}
.modul-nav-btn{
  flex:1;display:flex;align-items:center;gap:.5rem;
  padding:.85rem 1rem;border-radius:var(--r);
  background:var(--ivory);border:1px solid var(--border);
  cursor:pointer;text-decoration:none;
  transition:all .18s;
}
.modul-nav-btn:hover{background:var(--cream);border-color:var(--line)}
.modul-nav-btn.nav-next{justify-content:flex-end;text-align:right}
.modul-nav-btn.nav-prev{text-align:left}
.nav-label{font-size:.7rem;color:var(--brown3);font-weight:500;letter-spacing:.04em}
.nav-name{font-size:.85rem;color:var(--brown);font-weight:600}
.nav-arr{color:var(--terra);flex-shrink:0;font-size:1.1rem}
.modul-nav-btn.disabled{opacity:.35;pointer-events:none}

/* ── HIDDEN TAB CONTENT ── */
.tab-content{display:none}
.tab-content.active{display:block}

/* ── MOBILE ── */
@media(max-width:640px){
  .hero{padding:1.5rem 1.25rem 1.25rem}
  .hero-title{font-size:1.35rem}
  .ws-card{padding:1.25rem}
  .tl-item{grid-template-columns:90px 1fr}
  .tl-item:not(:last-child) .tl-right::before{
    left:calc(90px + 1.25rem + 9px);
  }
  .modul-selector{max-width:140px;font-size:.75rem}
  .btn-print{padding:.4rem .6rem;font-size:.75rem}
  .btn-print span{display:none}
  .modul-nav{flex-direction:column}
  .lk-actions{flex-direction:column}
  .lk-btn{justify-content:center}
}

/* ── PRINT ── */
@media print{
  .topbar,.modul-selector,.btn-print,.tab-nav,.modul-nav{display:none !important}
  body{background:white;font-size:11pt}
  .main{max-width:100%;padding:0}
  .hero{background:#3E362E;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ws-card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;margin-bottom:.5cm}
  .tab-content{display:block !important}
  .cl-item{min-height:auto}
  .lk-textarea{border:1pt solid #ccc;min-height:60pt}
  a{text-decoration:none;color:inherit}
}

/* ── SAGE BG (need for checklist) ── */
:root{--sage-bg:#EBF0E7}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="javascript:history.back()" class="tb-back">
    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
    Kembali
  </a>
  <span class="tb-title">PANDUAN WORKSHOP</span>
  <div class="tb-spacer"></div>
  <select class="modul-selector" id="modulSelector" aria-label="Pilih modul">
    <option value="1">Modul 1</option>
    <option value="2">Modul 2</option>
    <option value="3">Modul 3</option>
    <option value="4">Modul 4</option>
    <option value="5">Modul 5</option>
    <option value="6">Modul 6</option>
    <option value="7">Modul 7</option>
    <option value="8">Modul 8</option>
    <option value="9">Modul 9</option>
  </select>
  <a href="profil.html" class="tb-back" style="flex-shrink:0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Profil
  </a>
  <button class="btn-print" onclick="window.print()" aria-label="Cetak halaman">
    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a1 1 0 001 1h6a1 1 0 001-1v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a1 1 0 00-1-1H6a1 1 0 00-1 1zm2 0h6v3H7V4zm-1 9a1 1 0 100 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
    <span>Cetak</span>
  </button>
</header>

<!-- MAIN -->
<main class="main">

  <!-- HERO -->
  <section class="hero" id="heroSection">
    <div class="hero-badge"><span>📋</span> Sesi Tatap Muka</div>
    <div class="hero-modul-num" id="heroModulNum">MODUL 1</div>
    <h1 class="hero-title" id="heroTitle">Dasar & Konsep R&D</h1>
    <div class="hero-meta">
      <div class="hero-durasi">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
        <span id="heroDurasi">2 x 50 menit</span>
      </div>
    </div>
  </section>

  <!-- TAB NAV -->
  <nav class="tab-nav" role="tablist">
    <button class="tab-btn active" role="tab" aria-selected="true" data-tab="tujuan">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
      Tujuan
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="aktivitas">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
      Aktivitas
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="checklist">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm9.707 5.707a1 1 0 00-1.414-1.414L9 12.586l-1.293-1.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
      Checklist
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="lembarkerja">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>
      Lembar Kerja
    </button>
  </nav>

  <!-- TAB: TUJUAN -->
  <div class="tab-content active" id="tab-tujuan">
    <div class="ws-card">
      <div class="ws-card-title">Tujuan Pembelajaran Sesi</div>
      <ul class="tujuan-list" id="tujuanList"></ul>
    </div>
  </div>

  <!-- TAB: AKTIVITAS -->
  <div class="tab-content" id="tab-aktivitas">
    <div class="ws-card">
      <div class="ws-card-title">Alur Aktivitas Sesi</div>
      <div class="timeline" id="timelineList"></div>
    </div>
  </div>

  <!-- TAB: CHECKLIST -->
  <div class="tab-content" id="tab-checklist">
    <div class="ws-card">
      <div class="ws-card-title">Checklist Kesiapan Mahasiswa</div>
      <div class="cl-progress">
        <div class="cl-progress-bar"><div class="cl-progress-fill" id="clProgressFill" style="width:0%"></div></div>
        <div class="cl-progress-text" id="clProgressText">0 / 0</div>
      </div>
      <ul class="cl-list" id="checklistList"></ul>
      <button class="cl-reset" onclick="resetChecklist()">Reset Checklist</button>
    </div>
  </div>

  <!-- TAB: LEMBAR KERJA -->
  <div class="tab-content" id="tab-lembarkerja">
    <div class="ws-card">
      <div class="ws-card-title" id="lkJudul">Lembar Kerja</div>
      <div class="lk-instruksi" id="lkInstruksi"></div>
      <div class="lk-q-list" id="lkQuestions"></div>
      <div class="lk-actions">
        <button class="lk-btn lk-btn-primary" onclick="window.print()">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a1 1 0 001 1h6a1 1 0 001-1v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a1 1 0 00-1-1H6a1 1 0 00-1 1zm2 0h6v3H7V4z" clip-rule="evenodd"/></svg>
          Cetak Lembar Kerja
        </button>
        <button class="lk-btn lk-btn-secondary" onclick="clearLembarKerja()">

/* ══════════════════════════════════════════════════
   AUTH GUARD
   ══════════════════════════════════════════════════ */
(async () => {
  const isDemo = localStorage.getItem('sfp_demo') === '1' || typeof sb === 'undefined';
  if (isDemo) return; // demo mode — skip auth
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.replace('index.html'); return; }
  } catch(e) { console.error('Auth check error:', e); }
})();

/* ══════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════ */
let currentId = 1;
let checklistState = {};

/* ══════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════ */
function init() {
  const params = new URLSearchParams(window.location.search);
  currentId = parseInt(params.get('id')) || 1;
  if (currentId < 1 || currentId > 9 || isNaN(currentId)) currentId = 1;

  // Set selector
  const sel = document.getElementById('modulSelector');
  sel.value = String(currentId);
  sel.addEventListener('change', e => {
    window.location.href = 'workshop.html?id=' + e.target.value;
  });

  // Set page title
  document.title = `Workshop Modul ${currentId} — SMART-FLIP 5.0`;

  loadChecklist();
  render();
  setupTabs();
  renderNav();
}

/* ══════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════ */
function render() {
  const d = WORKSHOP_DATA[currentId];
  if (!d) return;

  // Hero
  document.getElementById('heroModulNum').textContent = `MODUL ${currentId}`;
  document.getElementById('heroTitle').textContent = d.judul;
  document.getElementById('heroDurasi').textContent = d.durasi;

  // Tujuan
  const tujuanList = document.getElementById('tujuanList');
  tujuanList.innerHTML = d.tujuan.map((t, i) => `
    <li class="tujuan-item">
      <div class="tujuan-icon" aria-hidden="true">${i + 1}</div>
      <span class="tujuan-text">${escHtml(t)}</span>
    </li>`).join('');

  // Aktivitas
  const tlList = document.getElementById('timelineList');
  tlList.innerHTML = d.aktivitas.map((a, i) => `
    <div class="tl-item">
      <div class="tl-left">
        <span class="tl-time">${escHtml(a.waktu)}</span>
      </div>
      <div class="tl-right">
        <div class="tl-dot"><div class="tl-dot-inner"></div></div>
        <div class="tl-nama">${escHtml(a.nama)}</div>
        <div class="tl-desc">${escHtml(a.deskripsi)}</div>
        <span class="tl-peran">👥 ${escHtml(a.peran)}</span>
      </div>
    </div>`).join('');

  // Checklist
  renderChecklist(d);

  // Lembar Kerja
  document.getElementById('lkJudul').textContent = d.lembarKerja.judul;
  document.getElementById('lkInstruksi').textContent = d.lembarKerja.instruksi;
  const lkQ = document.getElementById('lkQuestions');
  lkQ.innerHTML = d.lembarKerja.pertanyaan.map((q, i) => `
    <div class="lk-q-item">
      <div class="lk-q-num">Pertanyaan ${i + 1}</div>
      <div class="lk-q-text">${escHtml(q)}</div>
      <textarea class="lk-textarea" rows="3" placeholder="Tulis jawaban Anda di sini…"
        data-lk-key="sfp_lk_${currentId}_${i}"
        oninput="saveLkAnswer(this)">${getLkAnswer(currentId, i)}</textarea>
    </div>`).join('');
}

/* ══════════════════════════════════════════════════
   CHECKLIST
   ══════════════════════════════════════════════════ */
function loadChecklist() {
  try {
    const raw = localStorage.getItem(`sfp_ws_${currentId}`);
    checklistState = raw ? JSON.parse(raw) : {};
  } catch(e) {
    checklistState = {};
  }
}

function saveChecklist() {
  localStorage.setItem(`sfp_ws_${currentId}`, JSON.stringify(checklistState));
}

function renderChecklist(d) {
  const total = d.checklist.length;
  const done = d.checklist.filter((_, i) => checklistState[i]).length;
  const pct = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('clProgressFill').style.width = pct + '%';
  document.getElementById('clProgressText').textContent = `${done} / ${total}`;

  const cl = document.getElementById('checklistList');
  cl.innerHTML = d.checklist.map((item, i) => {
    const isDone = !!checklistState[i];
    return `<li class="cl-item${isDone ? ' done' : ''}" onclick="toggleCheck(${i})" role="checkbox" aria-checked="${isDone}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')toggleCheck(${i})">
      <div class="cl-checkbox" aria-hidden="true">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1.5,6 4.5,9 10.5,3"/>
        </svg>
      </div>
      <span class="cl-text">${escHtml(item)}</span>
    </li>`;
  }).join('');
}

function toggleCheck(idx) {
  checklistState[idx] = !checklistState[idx];
  saveChecklist();
  renderChecklist(WORKSHOP_DATA[currentId]);
}

function resetChecklist() {
  checklistState = {};
  saveChecklist();
  renderChecklist(WORKSHOP_DATA[currentId]);
}

/* ══════════════════════════════════════════════════
   LEMBAR KERJA PERSISTENCE
   ══════════════════════════════════════════════════ */
function getLkAnswer(modId, qIdx) {
  return localStorage.getItem(`sfp_lk_${modId}_${qIdx}`) || '';
}

function saveLkAnswer(el) {
  localStorage.setItem(el.dataset.lkKey, el.value);
}

function clearLembarKerja() {
  if (!confirm('Hapus semua jawaban lembar kerja modul ini?')) return;
  const d = WORKSHOP_DATA[currentId];
  if (!d || !d.lembarKerja) return;
  d.lembarKerja.pertanyaan.forEach((_, i) => {
    localStorage.removeItem(`sfp_lk_${currentId}_${i}`);
  });
  // Clear textareas
  document.querySelectorAll('[data-lk-key]').forEach(el => { el.value = ''; });
}

/* ══════════════════════════════════════════════════
   TABS
   ══════════════════════════════════════════════════ */
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
      document.getElementById('tab-' + tab).classList.add('active');
    });
  });
}

/* ══════════════════════════════════════════════════
   PREV / NEXT NAV
   ══════════════════════════════════════════════════ */
function renderNav() {
  const nav = document.getElementById('modulNav');
  const prevId = currentId - 1;
  const nextId = currentId + 1;

  const prevHtml = prevId >= 1
    ? `<a href="workshop.html?id=${prevId}" class="modul-nav-btn nav-prev">
        <span class="nav-arr">←</span>
        <div>
          <div class="nav-label">MODUL SEBELUMNYA</div>
          <div class="nav-name">${escHtml(WORKSHOP_DATA[prevId].judul)}</div>
        </div>
       </a>`
    : `<div class="modul-nav-btn nav-prev disabled">
        <span class="nav-arr">←</span>
        <div>
          <div class="nav-label">MODUL SEBELUMNYA</div>
          <div class="nav-name">—</div>
        </div>
       </div>`;

  const nextHtml = nextId <= 9
    ? `<a href="workshop.html?id=${nextId}" class="modul-nav-btn nav-next">
        <div>
          <div class="nav-label">MODUL BERIKUTNYA</div>
          <div class="nav-name">${escHtml(WORKSHOP_DATA[nextId].judul)}</div>
        </div>
        <span class="nav-arr">→</span>
       </a>`
    : `<div class="modul-nav-btn nav-next disabled">
        <div>
          <div class="nav-label">MODUL BERIKUTNYA</div>
          <div class="nav-name">—</div>
        </div>
        <span class="nav-arr">→</span>
       </div>`;

  nav.innerHTML = prevHtml + nextHtml;
}

/* ══════════════════════════════════════════════════
   UTILS
   ══════════════════════════════════════════════════ */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ══════════════════════════════════════════════════
   BOOT
   ══════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', init);
</script>
